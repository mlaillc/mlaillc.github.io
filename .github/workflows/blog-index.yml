name: Build blog index

on:
  push:
    branches: [main]
    paths:
      - "blog/posts/**"
      - "scripts/build_blog_index.py"
      - ".github/workflows/blog-index.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build posts.json
        run: python scripts/build_blog_index.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog/posts.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "build: rebuild blog posts.json"
            git push
          fi
