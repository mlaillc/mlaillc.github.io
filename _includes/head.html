<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }} - End-user-focused, local-first, privacy-focused AI experiences{% endif %}</title>
<meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 200 }}{% else %}{{ site.description }}{% endif %}" />
{% if page.url %}<link rel="canonical" href="{{ site.url }}{{ page.url }}" />{% endif %}

{% if page.layout == "post" %}
<meta property="og:type" content="article" />
<meta property="og:title" content="{{ page.title }}" />
<meta property="og:description" content="{{ page.excerpt | strip_html | strip_newlines | truncate: 200 }}" />
<meta property="og:url" content="{{ site.url }}{{ page.url }}" />
{% if page.image %}<meta property="og:image" content="{% if page.image contains '://' %}{{ page.image }}{% else %}{{ site.url }}{{ page.image }}{% endif %}" />{% endif %}
<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}" />
<meta name="twitter:card" content="{% if page.image %}summary_large_image{% else %}summary{% endif %}" />
<meta name="twitter:title" content="{{ page.title }}" />
<meta name="twitter:description" content="{{ page.excerpt | strip_html | strip_newlines | truncate: 200 }}" />
{% if page.image %}<meta name="twitter:image" content="{% if page.image contains '://' %}{{ page.image }}{% else %}{{ site.url }}{{ page.image }}{% endif %}" />{% endif %}
{% else %}
<meta property="og:type" content="website" />
<meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
<meta property="og:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 200 }}{% else %}{{ site.description }}{% endif %}" />
<meta property="og:url" content="{{ site.url }}{{ page.url }}" />
{% endif %}

<link rel="stylesheet" href="/assets/css/style.css" />
<link rel="stylesheet" href="/assets/css/blog.css" />
<link rel="stylesheet" href="/assets/css/rouge.css" />
{% if page.layout == "post" %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous" />
{% endif %}

<link rel="alternate" type="application/atom+xml" title="{{ site.title }} feed" href="/feed.xml" />
