---
layout: default
---
<main>
  <div class="container">
    <p style="margin: 2rem 0 1rem">
      <a href="/blog/" class="btn">&larr; All posts</a>
    </p>
    <div class="blog-layout reader-layout">
      {% include tag_sidebar.html %}
      <div class="blog-main">
        <article class="prose">
          <header class="post-header">
            <h1>{{ page.title }}</h1>
            <div class="post-meta">
              <span>{{ page.date | date: "%b %-d, %Y" }}</span>
              {% for t in page.tags %}<a class="chip" href="/blog/tag/{{ t | downcase }}/">#{{ t }}</a>{% endfor %}
            </div>
          </header>
          <div class="post-body">{{ content }}</div>
        </article>
      </div>
    </div>
    <p style="margin: 3rem 0 1rem">
      <a href="/blog/" class="btn">&larr; All posts</a>
    </p>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    if (window.renderMathInElement) {
      renderMathInElement(document.querySelector(".post-body"), {
        delimiters: [
          { left: "$$", right: "$$", display: true },
          { left: "$", right: "$", display: false },
          { left: "\\(", right: "\\)", display: false },
          { left: "\\[", right: "\\]", display: true }
        ],
        throwOnError: false
      });
    }
  });
</script>
<script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
